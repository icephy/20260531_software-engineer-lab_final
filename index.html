<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./static/reset.css">
    <link rel="stylesheet" href="./static/base.css">
    <link rel="stylesheet" href="./static/index.css">
    <title>20260531_software-engineer-lab_final</title>
</head>
<body>
  <!-- 遮罩區塊 -->
  <div class="mask"></div>

  <!-- 表頭區塊 -->
  <header class="z-1 sticky-top bg-primary-50">
    <nav>
      <div class="container">
        <div class="d-flex py-12 align-items-center">
          <a href="#">
            <picture>
              <source srcset="
                      https://raw.githubusercontent.com/hexschool/2022-web-layout-training/456698ad0b642710162489555e98fd3b15eb49ff/2026-web-camp/device-mobile.svg
                    " media="(max-width: 992px)" />
            <img src="https://raw.githubusercontent.com/hexschool/2022-web-layout-training/47001d42324ec6a2c7d00cc74ea79d70c57d578a/2026-web-camp/device-pc.svg" alt="Logo"></a>

          <!-- 行動版導覽列 -->
          <button class="menu-btn d-none d-md-block ml-auto p-12" type="button"><span class="material-symbols-outlined">dehaze</span>
          </button>  

          <!-- 桌機版導覽列 -->
          <ul class="nav-list d-flex align-items-center label-md ml-auto text-neutral-700 gap-24">
            <li><a class="py-4 px-12" href="#">服務項目</a></li>
            <li><a class="py-4 px-12" href="#">專案作品</a></li>
            <li><a class="py-4 px-12" href="#">部落格</a></li>
            <li><a class="py-4 px-12" href="#">與我聯絡</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>
  <!-- Hero 區塊 -->
  <section class="bg-primary-50">
    <div class="container">
      <div class="d-flex text-neutral-700 flex-md-col">
        <div class="col-5 m-auto col-md-12 order-md-2 py-md-24">
          <!-- 標題 -->
          <h1 class="heading-xxxl heading-mobile-xl mb-24 mb-md-12">
            <span class="d-block">Hello</span>
            <span class="d-block">I'm Nelson</span>
          </h1>
          <!-- 內文 -->
          <p class="paragraph-md mb-4 paragraph-mobile-sm">我是一個擁有 10 年經驗的 UIUX 設計師 和 前端工程師</p>
          <p class="paragraph-md mb-60 mb-md-32 paragraph-mobile-sm">喜歡把美學和程式結合，打造一個又一個精美的網頁設計！</p>
          <div class="label-md label-mobile-sm mb-md-24">
            <button class="text-neutral-0 bg-neutral-700 rounded-full py-12 px-24" type="button">與我聯絡</button>
            <button class="btn-outline rounded-full py-12 px-24" type="button">我的履歷</button>
          </div>
        </div>
        <div class="col-7 col-md-12 order-md-1">
          <!-- 圖片區塊 -->
          <div>
            <img class="object-fit-cover" src="https://github.com/hexschool/2022-web-layout-training/blob/main/2026-web-camp/index_person.png?raw=true" alt="Nelson">
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- 頁尾區塊 -->
  <footer class="bg-primary-900 text-neutral-0 py-80">
    <div class="container">
      <!-- 聯絡資訊 -->
       <div class="d-flex flex-md-col">
        <div class="col-5 col-md-12">
          <h2 class="mb-24">
            <span class="d-block heading-xxxs">與我聯絡</span>
            <span class="d-block heading-xxxl">CONTACT</span>
          </h2>
          <p class="paragraph-md mb-4">若有數位產品設計和開發相關問題</p>
          <p class="paragraph-md mb-92">歡迎填寫表單 或 直接與我聯絡！</p>
          <!-- 桌機版-社交按鈕區塊 -->
          <div class="d-block d-md-none">
            <div class="d-flex gap-12 mb-24">
              <a href="#" class="rounded-full p-12 btn-outline line-height-1"><i class="bi bi-instagram fs-24"></i></a>
              <a href="#" class="rounded-full p-12 btn-outline line-height-1"><i class="bi bi-line fs-24"></i></a>
              <a href="#" class="rounded-full p-12 btn-outline line-height-1"><i class="bi bi-linkedin fs-24"></i></a>
            </div>
            <a class="d-flex gap-8" href="mailto:service@hexschool.com">
            <span class="material-symbols-outlined fs-24">drafts</span>
            <p class="paragraph-md">service@hexschool.com</p>
            </a>
          </div>
        </div>
        <!-- 表單區塊 -->
        <div class="col-7 col-md-12 mb-md-24">
          <form class="d-flex flex-wrap paragraph-md gap-24 px-40 px-md-0">
            <input class="contact-input-half rounded-40 btn-outline py-20 px-32" type="text" placeholder="姓名" />
            <input class="contact-input-half rounded-40 btn-outline py-20 px-32" type="tel" placeholder="手機號碼" />
            <input class="w-full rounded-40 btn-outline py-20 px-32" type="email" placeholder="電子信箱" />
            <textarea class="w-full rounded-40 btn-outline py-20 px-32" row="4" placeholder="備註"></textarea>
            <button class="w-full rounded-full label-md text-neutral-700 bg-neutral-0 py-12 text-center" type="submit">送出</button>
          </form>
        </div>
        <!-- 行動版-社交按鈕區塊 -->
        <div class="d-none d-md-block">
            <div class="d-flex gap-12 mb-24">
              <a href="#" class="rounded-full p-12 btn-outline"><i class="bi bi-instagram fs-24 line-height-1"></i></a>
              <a href="#" class="rounded-full p-12 btn-outline"><i class="bi bi-line fs-24 line-height-1"></i></a>
              <a href="#" class="rounded-full p-12 btn-outline"><i class="bi bi-linkedin fs-24 line-height-1"></i></a>
            </div>
            <a class="d-flex gap-8" href="mailto:service@hexschool.com">
            <span class="material-symbols-outlined fs-24">drafts</span>
            <p class="paragraph-md">service@hexschool.com</p>
            </a>
        </div>
      </div>
    </div>
  </footer>
  <script src="./index.js"></script>
</body>
</html>
